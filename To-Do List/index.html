<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📝 To Do List</h1>

    <div class="date">
        <h3 id="day"></h3>
        <p id="today"></p>
    </div>

    <div class="form">

        <input
            type="text"
            id="task"
            placeholder="Masukkan tugas...">

        <select id="priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <input
            type="date"
            id="deadline">

        <button id="addBtn">
            Tambah
        </button>

    </div>

    <div class="section">

        <h2>📋 To Do</h2>

        <div id="todoList"></div>

    </div>

    <div class="section">

        <h2>✅ Done</h2>

        <div id="doneList"></div>

    </div>

    <button id="deleteAll">
        Delete All
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
